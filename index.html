<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>公大頭環遊世界 🐻</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#1a1a2e;font-family:'Helvetica Neue',Arial,'Microsoft JhengHei',sans-serif;overflow:hidden;height:100vh;width:100vw;}
#map-container{position:relative;width:100vw;height:100vh;overflow:hidden;cursor:grab;}
#map-container.grabbing{cursor:grabbing;}
#map-canvas{position:absolute;transform-origin:0 0;will-change:transform;}
#map-img{display:block;user-select:none;-webkit-user-drag:none;}

.marker{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:10;}
.marker:hover .pin-svg{filter:brightness(1.3) drop-shadow(0 0 8px rgba(231,76,60,0.9));}
.marker.empty .pin-svg path{fill:rgba(180,180,180,0.5);}
.marker.dragging{z-index:100;opacity:0.8;}
.pin-wrap{position:relative;width:32px;}
.pin-svg{width:32px;height:44px;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.6));transition:filter 0.2s;}
.pin-num{position:absolute;top:8px;left:50%;transform:translateX(-50%);color:#fff;font-size:10px;font-weight:800;pointer-events:none;}
.pin-label{position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);white-space:nowrap;background:rgba(10,10,30,0.85);color:#fff;font-size:10px;padding:3px 8px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity 0.2s;}
.marker:hover .pin-label{opacity:1;}

#toolbar{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:8px;align-items:center;background:rgba(15,15,35,0.9);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.1);border-radius:30px;padding:8px 18px;box-shadow:0 4px 24px rgba(0,0,0,0.5);}
#toolbar h1{color:#fff;font-size:13px;font-weight:700;white-space:nowrap;}
.tb-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:16px;padding:5px 13px;font-size:12px;cursor:pointer;white-space:nowrap;transition:background 0.2s;}
.tb-btn:hover{background:rgba(255,255,255,0.22);}
.tb-btn.active{background:#c0392b;border-color:#e74c3c;}
#add-btn{background:rgba(39,174,96,0.7);border-color:#27ae60;}
#add-btn:hover{background:#27ae60;}

#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
#overlay.show{display:flex;}

/* ── Postcard ── */
#postcard{background:#fffef5;border-radius:14px;max-width:400px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.55);overflow:hidden;display:none;border:3px solid #e8dcc8;}
.pc-header{background:linear-gradient(135deg,#8b1a1a,#c0392b,#e74c3c);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
.pc-header h2{color:#fff;font-size:15px;font-weight:700;}
.pc-close{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:18px;cursor:pointer;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;}
.pc-close:hover{background:rgba(255,255,255,0.35);}
.pc-img-wrap{width:100%;aspect-ratio:4/3;background:#f5ede0;overflow:hidden;border-bottom:2px dashed #e8dcc8;}
.pc-img-wrap img{width:100%;height:100%;object-fit:cover;}
.pc-no-img{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:#ccc;}
.pc-body{padding:14px 18px 8px;}
.pc-loc-tag{display:inline-flex;align-items:center;gap:5px;background:#fdecea;border:1px solid #f5b7b1;border-radius:12px;padding:3px 10px;font-size:12px;color:#c0392b;font-weight:600;margin-bottom:8px;}
.pc-msg{font-size:15px;color:#444;line-height:1.7;font-style:italic;}
.pc-footer{padding:8px 16px 14px;display:flex;gap:8px;border-top:1px dashed #e8dcc8;margin-top:6px;}
.pc-edit-btn{flex:1;padding:8px;border-radius:8px;border:1px solid #ddd;background:#f9f9f9;cursor:pointer;font-size:12px;color:#555;}
.pc-edit-btn:hover{background:#eee;}

/* ── Edit Modal ── */
#edit-modal{background:#fff;border-radius:14px;max-width:380px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,0.5);overflow:hidden;display:none;}
.em-header{background:linear-gradient(135deg,#2c3e50,#2980b9);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.em-header h2{color:#fff;font-size:14px;font-weight:700;}
.em-body{padding:14px 16px;display:flex;flex-direction:column;gap:11px;max-height:65vh;overflow-y:auto;}
.em-label{font-size:11px;color:#888;margin-bottom:3px;display:block;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;}
.em-input{width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:8px 10px;font-size:13px;outline:none;font-family:inherit;transition:border-color 0.2s;}
.em-input:focus{border-color:#2980b9;}
.em-textarea{resize:vertical;min-height:75px;}
.em-img-area{border:2px dashed #ddd;border-radius:10px;padding:14px;text-align:center;cursor:pointer;background:#fafafa;transition:all 0.2s;}
.em-img-area:hover{border-color:#2980b9;background:#f0f6fc;}
.em-img-area input{display:none;}
.em-preview{width:100%;max-height:150px;object-fit:cover;border-radius:7px;display:none;margin-bottom:6px;}
.em-hint{color:#aaa;font-size:12px;}
.em-footer{display:flex;gap:8px;padding:12px 16px;border-top:1px solid #eee;}
.em-cancel{flex:1;padding:9px;border-radius:8px;border:1px solid #ddd;background:#f5f5f5;cursor:pointer;font-size:13px;color:#666;}
.em-save{flex:2;padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;cursor:pointer;font-size:13px;font-weight:700;}
.em-save:hover{opacity:0.9;}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(39,174,96,0.95);color:#fff;padding:9px 22px;border-radius:22px;font-size:13px;z-index:500;opacity:0;transition:opacity 0.3s;pointer-events:none;}
#toast.show{opacity:1;}
#hint{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.5);color:rgba(255,255,255,0.8);padding:5px 14px;border-radius:16px;font-size:11px;z-index:150;pointer-events:none;}
</style>
</head>
<body>

<div id="toolbar">
  <h1>🐻 公大頭環遊世界</h1>
  <button class="tb-btn" id="adjust-btn" onclick="toggleAdjust()">📍 校正模式</button>
  <button class="tb-btn" id="add-btn" onclick="addMarker()">＋ 新增景點</button>
</div>

<div id="map-container">
  <div id="map-canvas">
    <img id="map-img" draggable="false" alt="世界地圖">
  </div>
</div>

<div id="overlay">
  <div id="postcard">
    <div class="pc-header">
      <h2 id="pc-title">景點</h2>
      <button class="pc-close" onclick="closeOverlay()">✕</button>
    </div>
    <div class="pc-img-wrap">
      <img id="pc-img" src="" alt="" style="display:none">
      <div class="pc-no-img" id="pc-noimg"><span style="font-size:40px">✈️</span><span style="font-size:13px">尚未上傳照片</span></div>
    </div>
    <div class="pc-body">
      <div class="pc-loc-tag"><span>📍</span><span id="pc-loc"></span></div>
      <div class="pc-msg" id="pc-msg"></div>
    </div>
    <div class="pc-footer">
      <button class="pc-edit-btn" onclick="openEdit()">✏️ 編輯此地點</button>
    </div>
  </div>

  <div id="edit-modal">
    <div class="em-header">
      <h2>✏️ 編輯地點</h2>
      <button class="pc-close" onclick="closeOverlay()">✕</button>
    </div>
    <div class="em-body">
      <div>
        <span class="em-label">📍 地點名稱</span>
        <input class="em-input" id="em-loc" placeholder="例：日本金閣寺">
      </div>
      <div>
        <span class="em-label">💬 留言</span>
        <textarea class="em-input em-textarea" id="em-msg" placeholder="寫一段溫暖的話..."></textarea>
      </div>
      <div>
        <span class="em-label">🖼️ 上傳照片</span>
        <div class="em-img-area" onclick="document.getElementById('em-file').click()">
          <input type="file" id="em-file" accept="image/*" onchange="previewImg(this)">
          <img id="em-preview" class="em-preview">
          <div id="em-hint" class="em-hint">👆 點此選擇照片</div>
        </div>
      </div>
    </div>
    <div class="em-footer">
      <button class="em-cancel" onclick="closeOverlay()">取消</button>
      <button class="em-save" onclick="saveMarker()">✅ 確定儲存</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="hint">拖曳平移地圖 ‧ 雙指或滾輪縮放</div>

<script>
const BASE = "https://raw.githubusercontent.com/Gongdatoe/kouta-world/main/";

// ── 預設12個紅標（前4個已有資料）──
const DEFAULT_MARKERS = [
  {id:1, loc:"日本・京都金閣寺", msg:"奶奶快快好起來，帶我來這裡喝綠茶 🍵", x:79.5, y:28.5, img: BASE+"img1.jpg"},
  {id:2, loc:"瑞士・馬特洪峰",   msg:"奶奶你看我堆雪人，有沒有很可愛？⛄",   x:50.5, y:21.5, img: BASE+"img2.jpg"},
  {id:3, loc:"法國・凡爾賽宮",   msg:"奶奶快點跟我來這裡追蝴蝶吹泡泡 🦋",   x:48.2, y:20.8, img: BASE+"img3.jpg"},
  {id:4, loc:"南非・薩凡納狩獵", msg:"奶奶這裡好多動物哦！噓，要小聲一點哦！🦏", x:55.5, y:60.5, img: BASE+"img4.jpg"},
  {id:5,  loc:"", msg:"", x:20.0, y:35.0, img:""},
  {id:6,  loc:"", msg:"", x:30.0, y:50.0, img:""},
  {id:7,  loc:"", msg:"", x:65.0, y:40.0, img:""},
  {id:8,  loc:"", msg:"", x:72.0, y:55.0, img:""},
  {id:9,  loc:"", msg:"", x:85.0, y:60.0, img:""},
  {id:10, loc:"", msg:"", x:25.0, y:65.0, img:""},
  {id:11, loc:"", msg:"", x:42.0, y:30.0, img:""},
  {id:12, loc:"", msg:"", x:60.0, y:20.0, img:""},
];

// ── State ──
let markers=[], adjustMode=false, activeId=null, editImgData="";
let mapW=0, mapH=0, scale=1, tx=0, ty=0;
let isPanning=false, panStart={x:0,y:0}, panOrigin={x:0,y:0};
let lastDist=0, lastTouch=null;

const canvas=document.getElementById('map-canvas');
const mapImg=document.getElementById('map-img');
const cont=document.getElementById('map-container');

// ── Storage ──
const LS="kouta_v3";
function saveAll(){ try{ localStorage.setItem(LS, JSON.stringify(markers)); }catch(e){ showToast("⚠️ 儲存空間不足"); } }
function loadSaved(){ try{ const d=localStorage.getItem(LS); return d?JSON.parse(d):null; }catch(e){ return null; } }

// ── Init ──
window.addEventListener('load', ()=>{
  const saved = loadSaved();
  if(saved){
    markers = DEFAULT_MARKERS.map(base=>{
      const s = saved.find(x=>x.id===base.id);
      if(!s) return {...base};
      return {...base, loc:s.loc||base.loc, msg:s.msg||base.msg,
              img:s.img||base.img, x:s.x??base.x, y:s.y??base.y};
    });
    saved.forEach(s=>{ if(!markers.find(m=>m.id===s.id)) markers.push(s); });
  } else {
    markers = DEFAULT_MARKERS.map(m=>({...m}));
  }

  mapImg.style.opacity = '0';
  mapImg.src = BASE + "Map.png";
  mapImg.onload = ()=>{
    mapW=mapImg.naturalWidth; mapH=mapImg.naturalHeight;
    fitMap();
    renderMarkers();
    mapImg.style.opacity = '1';
  };
  mapImg.onerror = ()=>{ showToast("⚠️ 地圖載入失敗，請確認 GitHub 設定"); };
  setupInteraction();
});

// ── Map fit ──
function fitMap(){
  const vw=window.innerWidth, vh=window.innerHeight;
  scale=Math.max(vw/mapW, vh/mapH);
  tx=(vw-mapW*scale)/2; ty=(vh-mapH*scale)/2;
  applyT();
}
function applyT(){
  canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  updatePins();
}
// 視窗大小改變時重新計算，不重置縮放
window._resizeTimer=null;
window.addEventListener('resize',()=>{
  clearTimeout(window._resizeTimer);
  window._resizeTimer=setTimeout(()=>{ if(mapW)fitMap(); },150);
});
function applyT(){ canvas.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; updatePins(); }

// ── Markers ──
function renderMarkers(){ document.querySelectorAll('.marker').forEach(e=>e.remove()); markers.forEach(createPin); }

function createPin(m){
  const el=document.createElement('div');
  el.className='marker'+(m.loc||m.img||m.msg?'':' empty');
  el.id='pin-'+m.id;
  el.innerHTML=`
    <div class="pin-wrap">
      <svg class="pin-svg" viewBox="0 0 32 44" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 0C7.163 0 0 7.163 0 16c0 12 16 28 16 28S32 28 32 16C32 7.163 24.837 0 16 0z"
          fill="${m.loc||m.img||m.msg?'#e74c3c':'rgba(160,160,160,0.5)'}"/>
        <circle cx="16" cy="16" r="7" fill="white" opacity="0.92"/>
      </svg>
      <span class="pin-num">${m.id}</span>
    </div>
    ${m.loc?`<div class="pin-label">${m.loc}</div>`:''}
  `;
  placePin(el,m);
  el.addEventListener('click',e=>{ e.stopPropagation(); clickPin(m.id); });
  setupPinDrag(el,m);
  cont.appendChild(el);
}

function placePin(el,m){
  if(!mapW)return;
  el.style.left=(tx+m.x/100*mapW*scale)+'px';
  el.style.top=(ty+m.y/100*mapH*scale)+'px';
}
function updatePins(){ markers.forEach(m=>{ const el=document.getElementById('pin-'+m.id); if(el)placePin(el,m); }); }

function setupPinDrag(el,m){
  let drag=false,sx,sy,ox,oy;
  const s=(cx,cy)=>{ if(!adjustMode)return; drag=true; sx=cx;sy=cy;ox=m.x;oy=m.y; el.classList.add('dragging'); };
  const mv=(cx,cy)=>{ if(!drag)return; m.x=Math.max(0,Math.min(100,ox+(cx-sx)/(mapW*scale)*100)); m.y=Math.max(0,Math.min(100,oy+(cy-sy)/(mapH*scale)*100)); placePin(el,m); };
  const en=()=>{ if(!drag)return; drag=false; el.classList.remove('dragging'); saveAll(); };
  el.addEventListener('mousedown',e=>{ if(adjustMode){e.stopPropagation();e.preventDefault();s(e.clientX,e.clientY);} });
  window.addEventListener('mousemove',e=>mv(e.clientX,e.clientY));
  window.addEventListener('mouseup',en);
  el.addEventListener('touchstart',e=>{ if(adjustMode){e.stopPropagation();e.preventDefault();s(e.touches[0].clientX,e.touches[0].clientY);} },{passive:false});
  window.addEventListener('touchmove',e=>{ if(drag){e.preventDefault();mv(e.touches[0].clientX,e.touches[0].clientY);} },{passive:false});
  window.addEventListener('touchend',en);
}

// ── Pan/Zoom ──
function setupInteraction(){
  cont.addEventListener('mousedown',e=>{ if(adjustMode)return; isPanning=true; panStart={x:e.clientX,y:e.clientY}; panOrigin={x:tx,y:ty}; cont.classList.add('grabbing'); });
  window.addEventListener('mousemove',e=>{ if(!isPanning)return; tx=panOrigin.x+(e.clientX-panStart.x); ty=panOrigin.y+(e.clientY-panStart.y); applyT(); });
  window.addEventListener('mouseup',()=>{ isPanning=false; cont.classList.remove('grabbing'); });
  cont.addEventListener('wheel',e=>{ e.preventDefault(); zoom(e.deltaY<0?1.1:0.9,e.clientX,e.clientY); },{passive:false});
  cont.addEventListener('touchstart',e=>{ if(adjustMode)return; if(e.touches.length===1){lastTouch={x:e.touches[0].clientX,y:e.touches[0].clientY};panOrigin={x:tx,y:ty};} if(e.touches.length===2)lastDist=tdist(e); },{passive:true});
  cont.addEventListener('touchmove',e=>{ if(adjustMode)return; e.preventDefault();
    if(e.touches.length===1&&lastTouch){tx=panOrigin.x+(e.touches[0].clientX-lastTouch.x);ty=panOrigin.y+(e.touches[0].clientY-lastTouch.y);applyT();}
    if(e.touches.length===2){const d=tdist(e);if(lastDist){const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;zoom(d/lastDist,cx,cy);}lastDist=d;}
  },{passive:false});
  cont.addEventListener('touchend',()=>{ lastTouch=null;lastDist=0; });

}
function zoom(f,ox,oy){ const ns=Math.min(10,Math.max(0.25,scale*f)); tx=ox-(ox-tx)*(ns/scale); ty=oy-(oy-ty)*(ns/scale); scale=ns; applyT(); }
function tdist(e){ const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY; return Math.sqrt(dx*dx+dy*dy); }

// ── Click pin ──
function clickPin(id){
  if(adjustMode)return;
  activeId=id;
  const m=markers.find(x=>x.id===id); if(!m)return;
  document.getElementById('pc-title').textContent=m.loc||`景點 #${id}`;
  document.getElementById('pc-loc').textContent=m.loc||`景點 #${id}`;
  document.getElementById('pc-msg').textContent=m.msg||'（尚未填寫留言）';
  const img=document.getElementById('pc-img'),ph=document.getElementById('pc-noimg');
  if(m.img){img.src=m.img;img.style.display='block';ph.style.display='none';}
  else{img.style.display='none';ph.style.display='flex';}
  document.getElementById('postcard').style.display='block';
  document.getElementById('edit-modal').style.display='none';
  document.getElementById('overlay').classList.add('show');
}

// ── Edit ──
function openEdit(){
  const m=markers.find(x=>x.id===activeId); if(!m)return;
  document.getElementById('em-loc').value=m.loc||'';
  document.getElementById('em-msg').value=m.msg||'';
  editImgData=m.img||'';
  const prev=document.getElementById('em-preview'),hint=document.getElementById('em-hint');
  if(editImgData){prev.src=editImgData;prev.style.display='block';hint.style.display='none';}
  else{prev.style.display='none';hint.style.display='block';}
  document.getElementById('postcard').style.display='none';
  document.getElementById('edit-modal').style.display='block';
}

function previewImg(input){
  if(!input.files[0])return;
  const r=new FileReader();
  r.onload=e=>{ editImgData=e.target.result; const p=document.getElementById('em-preview'); p.src=editImgData; p.style.display='block'; document.getElementById('em-hint').style.display='none'; };
  r.readAsDataURL(input.files[0]);
}

function saveMarker(){
  const m=markers.find(x=>x.id===activeId); if(!m)return;
  m.loc=document.getElementById('em-loc').value.trim();
  m.msg=document.getElementById('em-msg').value.trim();
  m.img=editImgData;
  saveAll();
  const el=document.getElementById('pin-'+m.id); if(el)el.remove();
  createPin(m);
  closeOverlay();
  showToast('✅ 儲存成功！');
}

// ── Add marker ──
function addMarker(){
  const newId=markers.length?Math.max(...markers.map(m=>m.id))+1:1;
  const m={id:newId,loc:'',msg:'',x:50,y:45,img:''};
  markers.push(m); createPin(m); saveAll();
  activeId=newId; openEdit();
}

// ── Adjust mode ──
function toggleAdjust(){
  adjustMode=!adjustMode;
  const btn=document.getElementById('adjust-btn');
  btn.classList.toggle('active',adjustMode);
  btn.textContent=adjustMode?'✅ 完成校正':'📍 校正模式';
  document.getElementById('hint').textContent=adjustMode?'拖曳紅標到正確位置':'拖曳平移地圖 ‧ 雙指或滾輪縮放';
  if(!adjustMode)showToast('📍 位置已儲存！');
}

// ── Helpers ──
function closeOverlay(){
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('postcard').style.display='none';
  document.getElementById('edit-modal').style.display='none';
  activeId=null; editImgData=''; document.getElementById('em-file').value='';
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay'))closeOverlay(); });
</script>
</body>
</html>
