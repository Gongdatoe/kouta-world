<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>公大頭環遊世界 🐻</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,'Microsoft JhengHei',sans-serif;}

#stage{position:fixed;top:0;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;touch-action:none;}
#stage.grabbing{cursor:grabbing;}
#world{position:absolute;top:0;left:0;transform-origin:top left;}
#world img{display:block;max-width:none;user-select:none;-webkit-user-drag:none;pointer-events:none;}

.pin{position:absolute;transform:translate(-50%,-100%);cursor:pointer;z-index:10;}
.pin svg{display:block;filter:drop-shadow(0 3px 5px rgba(0,0,0,0.6));}
.pin .num{position:absolute;top:8px;left:50%;transform:translateX(-50%);color:#fff;font-size:10px;font-weight:800;pointer-events:none;}
.pin .lbl{position:absolute;top:100%;left:50%;transform:translateX(-50%);margin-top:4px;white-space:nowrap;background:rgba(0,0,0,0.75);color:#fff;font-size:10px;padding:2px 7px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .2s;}
.pin:hover .lbl{opacity:1;}
.pin.dragging{opacity:.7;z-index:99;}

#toolbar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:200;display:flex;gap:8px;align-items:center;background:rgba(10,10,30,0.88);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:30px;padding:7px 16px;}
#toolbar h1{color:#fff;font-size:13px;font-weight:700;white-space:nowrap;}
.tbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:14px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap;}
.tbtn.on{background:#c0392b;border-color:#e74c3c;}

#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:none;align-items:center;justify-content:center;padding:16px;}
#overlay.show{display:flex;}

#card{background:#fffef5;border-radius:14px;max-width:400px;width:100%;border:3px solid #e8dcc8;overflow:hidden;display:none;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.ch{background:linear-gradient(135deg,#8b1a1a,#e74c3c);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
.ch h2{color:#fff;font-size:15px;font-weight:700;}
.xbtn{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:17px;cursor:pointer;border-radius:50%;width:27px;height:27px;display:flex;align-items:center;justify-content:center;}
.cimg{width:100%;aspect-ratio:4/3;background:#f0e8d8;overflow:hidden;border-bottom:2px dashed #e8dcc8;}
.cimg img{width:100%;height:100%;object-fit:cover;}
.cnoi{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:#ccc;}
.cbody{padding:13px 17px 15px;}
.ctag{display:inline-flex;align-items:center;gap:4px;background:#fdecea;border:1px solid #f5b7b1;border-radius:10px;padding:3px 9px;font-size:12px;color:#c0392b;font-weight:600;margin-bottom:7px;}
.cmsg{font-size:15px;color:#444;line-height:1.7;font-style:italic;}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(39,174,96,.95);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;}
#toast.show{opacity:1;}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);color:rgba(255,255,255,.8);padding:5px 13px;border-radius:14px;font-size:11px;z-index:150;pointer-events:none;}

#loading{position:fixed;inset:0;background:#1a1a2e;z-index:400;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#loading p{color:#aaa;font-size:13px;}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.15);border-top-color:#e74c3c;border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

#exportBox{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#exportBox .inner{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:420px;}
#exportBox p{font-size:14px;color:#333;margin-bottom:12px;font-weight:700;}
#exportBox .txt{width:100%;min-height:160px;font-size:11px;font-family:monospace;border:2px solid #e74c3c;border-radius:8px;padding:10px;background:#fff8f8;color:#333;white-space:pre-wrap;user-select:all;-webkit-user-select:all;}
#exportBox button{margin-top:14px;width:100%;padding:12px;background:#e74c3c;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:52px">🌍</div>
  <div class="spin"></div>
  <p>載入中...</p>
</div>

<div id="toolbar">
  <h1>🐻 公大頭環遊世界</h1>
  <button class="tbtn" id="adjBtn">📍 校正</button>
</div>

<div id="stage">
  <div id="world">
    <img id="mapImg" alt="世界地圖">
  </div>
</div>

<div id="overlay">
  <div id="card">
    <div class="ch"><h2 id="ctitle"></h2><button class="xbtn" id="closeBtn">✕</button></div>
    <div class="cimg">
      <img id="cimg" style="display:none">
      <div class="cnoi" id="cnoi"><span style="font-size:36px">✈️</span><span style="font-size:12px">尚未上傳照片</span></div>
    </div>
    <div class="cbody">
      <div class="ctag"><span>📍</span><span id="cloc"></span></div>
      <div class="cmsg" id="cmsg"></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="hint">拖曳平移 ‧ 雙指縮放</div>

<script>
(function(){
  'use strict';

  const V = Date.now();
  const LS_KEY = "kouta_pos_v1";

  // 清除舊版本資料 + 如果目前版本資料壞掉也清掉
  try{
    ['kouta_v3','kouta_v4','kouta_v5','kouta_v6','kouta_v7_pos_only'].forEach(k=>{
      try{ localStorage.removeItem(k); }catch(e){}
    });
    // 檢查目前版本資料是否合法
    const test = localStorage.getItem(LS_KEY);
    if(test){
      try{
        const parsed = JSON.parse(test);
        if(!Array.isArray(parsed)) throw new Error('bad');
      }catch(e){
        localStorage.removeItem(LS_KEY); // 壞掉就清
      }
    }
  }catch(e){}

  // ═══════════════════════════════════
  //  預設資料（以 HTML 為準，最新版本）
  // ═══════════════════════════════════
  const DEFAULTS = [
    {id:1, loc:"日本・京都金閣寺", msg:"奶奶快快好起來，帶我來這裡喝綠茶 🍵", px:82.9, py:40.5, img:"img1.jpg"},
    {id:2, loc:"瑞士・馬特洪峰",   msg:"奶奶你看我堆雪人，有沒有很可愛？⛄",   px:48.2, py:32.7, img:"img2.jpg"},
    {id:3, loc:"法國・凡爾賽宮",   msg:"奶奶快點跟我來這裡追蝴蝶吹泡泡 🦋",   px:47.0, py:34.1, img:"img3.jpg"},
    {id:4, loc:"南非・薩凡納狩獵", msg:"奶奶這裡好多動物哦！噓，要小聲一點哦！🦏", px:52.9, py:67.7, img:"img4.jpg"},
    {id:5, loc:"美國・舊金山灣區", msg:"奶奶我們去找美國姨姨看小baby！🌉", px:15.1, py:40.5, img:"img5.jpg"},
    {id:6, loc:"巴西・里約耶穌像", msg:"奶奶上帝會保佑你健健康康的唷！🙏", px:32.1, py:57.6, img:"img6.jpg"},
    {id:7, loc:"埃及・吉薩金字塔", msg:"奶奶那個是金字塔耶！木乃伊會不會出來嚇熊？！🏺", px:54.2, py:46.2, img:"img7.jpg"},
    {id:8, loc:"泰國・普吉島",     msg:"奶奶夏天到了我們來玩騎馬打水仗 🏖️", px:73.5, py:53.9, img:"img8.jpg"},
    {id:9, loc:"澳洲・布里斯本",   msg:"奶奶我是東華抱歉隊的王牌9號哦！抱歉～🥍", px:84.8, py:73.5, img:"img9.jpg"},
    {id:10, loc:"北極圈・格陵蘭",  msg:"奶奶就是這個光！就是這個光！✨🐕", px:35.8, py:15.7, img:"img10.jpg"},
    {id:11, loc:"北歐・世界最美小鎮", msg:"奶奶你看，我從魔法學院畢業囉！⚡🦉", px:52.1, py:28.3, img:"img11.jpg"},
    {id:12, loc:"中國・萬里長城",  msg:"奶奶他們說投10塊當一次秦始皇！🐎", px:75.8, py:36.0, img:"img12.jpg"},
  ];

  // ═══════════════════════════════════
  //  State
  // ═══════════════════════════════════
  let markers = [];
  let adjMode = false;
  let mapW = 0, mapH = 0;
  let ox = 0, oy = 0, sc = 1;
  let panning = false, ps = {x:0,y:0}, po = {x:0,y:0};
  let ldist = 0, ltouch = null;

  const stage = document.getElementById('stage');
  const world = document.getElementById('world');
  const mapImg = document.getElementById('mapImg');
  const overlay = document.getElementById('overlay');

  // ═══════════════════════════════════
  //  Storage (只存位置)
  // ═══════════════════════════════════
  function savePos(){
    try{
      const pos = markers.map(m=>({id:m.id, px:m.px, py:m.py}));
      localStorage.setItem(LS_KEY, JSON.stringify(pos));
    }catch(e){}
  }

  function loadPos(){
    try{
      const d = localStorage.getItem(LS_KEY);
      return d ? JSON.parse(d) : null;
    }catch(e){ return null; }
  }

  // ═══════════════════════════════════
  //  Init markers（內容用 DEFAULTS，位置用 localStorage）
  // ═══════════════════════════════════
  function initMarkers(){
    const saved = loadPos();
    markers = DEFAULTS.map(def=>{
      const p = saved ? saved.find(s=>s.id===def.id) : null;
      return {
        id: def.id,
        loc: def.loc,
        msg: def.msg,
        img: def.img ? def.img + "?" + V : "",
        px: p && typeof p.px === 'number' ? p.px : def.px,
        py: p && typeof p.py === 'number' ? p.py : def.py,
      };
    });
  }

  // ═══════════════════════════════════
  //  Map
  // ═══════════════════════════════════
  function loadMap(){
    mapImg.onload = function(){
      mapW = mapImg.naturalWidth;
      mapH = mapImg.naturalHeight;
      world.style.width = mapW + "px";
      world.style.height = mapH + "px";
      mapImg.style.width = mapW + "px";
      mapImg.style.height = mapH + "px";

      fitMap();
      renderPins();
      document.getElementById('loading').style.display = 'none';
    };
    mapImg.onerror = function(){
      document.getElementById('loading').innerHTML =
        '<p style="color:#e74c3c;font-size:14px;text-align:center">⚠️ 地圖載入失敗<br>請確認 GitHub 上有 Map.jpg</p>';
    };
    mapImg.src = "Map.jpg?" + V;
  }

  function fitMap(){
    const sw = stage.offsetWidth;
    const sh = stage.offsetHeight;
    sc = Math.max(sw/mapW, sh/mapH);
    ox = (sw - mapW*sc) / 2;
    oy = (sh - mapH*sc) / 2;
    applyTransform();
  }

  function applyTransform(){
    world.style.transform = 'translate('+ox+'px,'+oy+'px) scale('+sc+')';
  }

  // ═══════════════════════════════════
  //  Pins
  // ═══════════════════════════════════
  function renderPins(){
    const old = world.querySelectorAll('.pin');
    old.forEach(e=>e.remove());
    markers.forEach(makePin);
  }

  function makePin(m){
    const filled = m.loc || m.img || m.msg;
    const el = document.createElement('div');
    el.className = 'pin';
    el.id = 'pin'+m.id;
    el.style.left = (m.px/100 * mapW) + 'px';
    el.style.top  = (m.py/100 * mapH) + 'px';
    el.innerHTML =
      '<svg width="32" height="44" viewBox="0 0 32 44">'+
      '<path d="M16 0C7.163 0 0 7.163 0 16c0 12 16 28 16 28S32 28 32 16C32 7.163 24.837 0 16 0z" fill="'+(filled?'#e74c3c':'rgba(150,150,150,0.45)')+'"/>'+
      '<circle cx="16" cy="16" r="7" fill="white" opacity=".9"/>'+
      '</svg>'+
      '<span class="num">'+m.id+'</span>'+
      (m.loc?'<div class="lbl">'+m.loc+'</div>':'');
    el.addEventListener('click', function(e){
      e.stopPropagation();
      onPinClick(m.id);
    });
    setupPinDrag(el, m);
    world.appendChild(el);
  }

  function setupPinDrag(el, m){
    let drag=false, sx,sy, ox0,oy0;

    function start(cx, cy){
      if(!adjMode) return;
      drag=true; sx=cx; sy=cy;
      ox0=m.px; oy0=m.py;
      el.classList.add('dragging');
    }
    function move(cx, cy){
      if(!drag) return;
      const dx = (cx-sx)/sc;
      const dy = (cy-sy)/sc;
      m.px = Math.max(0,Math.min(100, ox0 + dx/mapW*100));
      m.py = Math.max(0,Math.min(100, oy0 + dy/mapH*100));
      el.style.left = (m.px/100*mapW)+'px';
      el.style.top  = (m.py/100*mapH)+'px';
    }
    function end(){
      if(!drag) return;
      drag=false;
      el.classList.remove('dragging');
      savePos();
    }

    el.addEventListener('mousedown', function(e){
      if(adjMode){ e.stopPropagation(); e.preventDefault(); start(e.clientX, e.clientY); }
    });
    window.addEventListener('mousemove', function(e){ if(drag) move(e.clientX, e.clientY); });
    window.addEventListener('mouseup', end);

    el.addEventListener('touchstart', function(e){
      if(adjMode){ e.stopPropagation(); e.preventDefault(); start(e.touches[0].clientX, e.touches[0].clientY); }
    }, {passive:false});
    window.addEventListener('touchmove', function(e){
      if(drag){ e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }
    }, {passive:false});
    window.addEventListener('touchend', end);
  }

  // ═══════════════════════════════════
  //  Gestures
  // ═══════════════════════════════════
  function setupGestures(){
    stage.addEventListener('mousedown', function(e){
      if(adjMode) return;
      panning=true; ps={x:e.clientX,y:e.clientY}; po={x:ox,y:oy};
      stage.classList.add('grabbing');
    });
    window.addEventListener('mousemove', function(e){
      if(!panning) return;
      ox=po.x+(e.clientX-ps.x);
      oy=po.y+(e.clientY-ps.y);
      applyTransform();
    });
    window.addEventListener('mouseup', function(){
      panning=false; stage.classList.remove('grabbing');
    });

    stage.addEventListener('wheel', function(e){
      e.preventDefault();
      doZoom(e.deltaY<0?1.1:0.9, e.clientX, e.clientY);
    }, {passive:false});

    stage.addEventListener('touchstart', function(e){
      if(adjMode) return;
      if(e.touches.length===1){
        ltouch={x:e.touches[0].clientX, y:e.touches[0].clientY};
        po={x:ox, y:oy};
      }
      if(e.touches.length===2) ldist=tDist(e);
    }, {passive:true});

    stage.addEventListener('touchmove', function(e){
      if(adjMode) return;
      e.preventDefault();
      if(e.touches.length===1 && ltouch){
        ox=po.x+(e.touches[0].clientX-ltouch.x);
        oy=po.y+(e.touches[0].clientY-ltouch.y);
        applyTransform();
      }
      if(e.touches.length===2){
        const d=tDist(e);
        if(ldist){
          const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
          const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
          doZoom(d/ldist, cx, cy);
        }
        ldist=d;
      }
    }, {passive:false});

    stage.addEventListener('touchend', function(){ ltouch=null; ldist=0; });

    let rt;
    window.addEventListener('resize', function(){
      clearTimeout(rt);
      rt=setTimeout(function(){ if(mapW) fitMap(); }, 200);
    });
  }

  function doZoom(f, cx, cy){
    const ns = Math.min(10, Math.max(0.2, sc*f));
    ox = cx-(cx-ox)*(ns/sc);
    oy = cy-(cy-oy)*(ns/sc);
    sc = ns;
    applyTransform();
  }

  function tDist(e){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }

  // ═══════════════════════════════════
  //  Pin click → card
  // ═══════════════════════════════════
  function onPinClick(id){
    if(adjMode) return;
    const m = markers.find(function(x){ return x.id===id; });
    if(!m) return;
    document.getElementById('ctitle').textContent = m.loc || '景點 #'+id;
    document.getElementById('cloc').textContent = m.loc || '景點 #'+id;
    document.getElementById('cmsg').textContent = m.msg || '（尚未填寫留言）';
    const ci = document.getElementById('cimg');
    const cn = document.getElementById('cnoi');
    if(m.img){
      ci.src = m.img;
      ci.style.display = 'block';
      cn.style.display = 'none';
    } else {
      ci.style.display = 'none';
      cn.style.display = 'flex';
    }
    document.getElementById('card').style.display = 'block';
    overlay.classList.add('show');
  }

  function closeAll(){
    overlay.classList.remove('show');
    document.getElementById('card').style.display = 'none';
  }

  // ═══════════════════════════════════
  //  Adjust mode
  // ═══════════════════════════════════
  function toggleAdj(){
    adjMode = !adjMode;
    const btn = document.getElementById('adjBtn');
    btn.classList.toggle('on', adjMode);
    btn.textContent = adjMode ? '✅ 完成' : '📍 校正';
    document.getElementById('hint').textContent = adjMode ? '拖曳紅標調整位置' : '拖曳平移 ‧ 雙指縮放';
    if(!adjMode){
      savePos();
      const txt = markers.map(function(m){
        return 'id:'+m.id+' px:'+m.px.toFixed(1)+' py:'+m.py.toFixed(1);
      }).join('\n');
      showExport(txt);
    }
  }

  function showExport(txt){
    const existing = document.getElementById('exportBox');
    if(existing) existing.remove();
    const div = document.createElement('div');
    div.id = 'exportBox';
    div.innerHTML =
      '<div class="inner">'+
      '<p>📋 長按下方文字 → 全選 → 複製 → 貼給豚豚</p>'+
      '<div class="txt">'+txt+'</div>'+
      '<button>關閉</button>'+
      '</div>';
    document.body.appendChild(div);
    div.querySelector('button').addEventListener('click', function(){
      div.remove();
    });
  }

  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2500);
  }

  // ═══════════════════════════════════
  //  Bind events & start
  // ═══════════════════════════════════
  document.getElementById('adjBtn').addEventListener('click', toggleAdj);
  document.getElementById('closeBtn').addEventListener('click', closeAll);
  overlay.addEventListener('click', function(e){
    if(e.target === overlay) closeAll();
  });

  // START
  initMarkers();
  setupGestures();
  loadMap();

})();
</script>
</body>
</html>
